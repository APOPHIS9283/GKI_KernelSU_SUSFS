name: Build Pixel 9 Pro XL Kernel with KernelSU-Next & SUSFS (Android 15)

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab
  push:
    branches:
      - main

jobs:
  build-pixel-kernel:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your repository containing custom patches/configs
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Free up ~30-40GB of hidden disk space on the runner
      - name: Free Disk Space (Cleanup Runner)
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          
          # Delete heavy pre-installed tooling not needed for kernel compilation
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          
          # Clean up system package caches and docker images
          sudo apt-get clean
          docker image prune --all --force
          
          echo "=== Disk space after cleanup ==="
          df -h

      # 3. Install repo tool and necessary system dependencies
      - name: Set up Environment Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y repo git-core gnupg flex bison build-essential libssl-dev curl patch
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      # 4. Initialize and sync the Pixel 9 (caimito) Android 15 QPR1 source
      - name: Repo Init and Shallow Sync
        run: |
          # --depth=1 sets up the workspace to only track the latest commits
          repo init -u https://android.googlesource.com/kernel/manifest -b android-gs-caimito-6.1-android15-qpr1 --depth=1
          
          # Shallow sync to save space and avoid downloading unnecessary branches
          repo sync -j$(nproc) -c --no-tags --no-clone-bundle

      # 5. Integrate KernelSU-Next and Apply SUSFS Android 15 Patches
      - name: Integrate KernelSU-Next & SUSFS (Android 15 Layout)
        run: |
          ABS_WORKSPACE=$(pwd)
          
          # Step A: Clone the official SUSFS repository outside of the build tree
          git clone https://gitlab.com/simonpunk/susfs4ksu.git ../susfs4ksu
          
          # Step B: Dynamically locate the actual main kernel core directory (resolves to ./aosp)
          KERNEL_CORE_DIR=$(dirname $(find . -maxdepth 3 -type d -name "drivers" | head -n 1))
          echo "Found kernel core directory at: $KERNEL_CORE_DIR"
          
          # Step C: Enter the true kernel root folder so the automated script finds drivers/ instantly
          cd "$KERNEL_CORE_DIR"
          
          # Step D: Run KernelSU-Next's official integration mechanics from their development branch
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
          
          # Step E: Distribute SUSFS engine source definitions into place
          cp ../../susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp ../../susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
          
          # Step F: Bind SUSFS flag manually to KernelSU-Next's structural Makefile configuration
          grep -q "ccflags-y += -DCONFIG_KSU_SUSFS" drivers/kernelsu/Makefile || echo "ccflags-y += -DCONFIG_KSU_SUSFS" >> drivers/kernelsu/Makefile
          
          # Step G: Apply the core GKI 6.1 baseline patch directly onto the kernel tree folder
          cp ../../susfs4ksu/kernel_patches/6.1/50_add_susfs_in_kernel-6.1.patch .
          patch -p1 < 50_add_susfs_in_kernel-6.1.patch
          
          # Return to the primary build execution directory
          cd "$ABS_WORKSPACE"

      # 6. Restore Bazel caching to speed up compilation runs
      - name: Cache Bazel Internal Outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
          key: Linux-pixel9-bazel-${{ github.sha }}
          restore-keys: |
            Linux-pixel9-bazel-

      # 7. Execute the Bazel/Kleaf build target for the caimito (Pixel 9 Pro XL)
      - name: Build Caimito Kernel
        run: |
          # Added --config=caimito to properly link the Tensor SoC and WLAN hardware drivers
          tools/bazel run --config=caimito //private/devices/google/caimito:zumapro_caimito_dist

      # 8. Upload your completed Kernel/Boot artifacts 
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Pixel-9-Pro-XL-KernelSU-Next-SUSFS-A15
          path: out/zumapro_caimito_dist/
